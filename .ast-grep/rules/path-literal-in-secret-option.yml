id: path-literal-in-secret-option
language: Nix
severity: error
message: >-
  Path literal assigned to a secret-related option — file contents will be
  copied into /nix/store (world-readable by all users). Use a string path
  like "/run/secrets/name" or config.sops.secrets.*.path instead.
note: >-
  In Nix, ./foo is a path literal that gets copied to the store at eval time.
  "/foo" is a string that stays external. This is the #1 secrets footgun.
  Exception: sopsFile is excluded — encrypted files are safe in the store.
rule:
  kind: binding
  all:
    - has:
        field: attrpath
        regex: "(password|secret|key|cert|token|credential)(File|Path)$"
    - not:
        has:
          field: attrpath
          regex: "^sopsFile$"
    - has:
        field: expression
        any:
          - kind: path_expression
          - kind: path_fragment
