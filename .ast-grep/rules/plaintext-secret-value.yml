id: plaintext-secret-value
language: Nix
severity: warning
message: >-
  Possible plaintext secret assigned to a password/key/token option.
  Values in .nix files end up in /nix/store (world-readable).
  Use hashedPasswordFile, a *File option, or sops-nix instead.
rule:
  kind: binding
  all:
    - has:
        field: attrpath
        regex: "\\b(password|hashedPassword|apiKey|api_key|token|admin_password)$"
    - has:
        field: expression
        kind: string_expression
